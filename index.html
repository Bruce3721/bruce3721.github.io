<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSTQ 2026 极致评估</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .step-container { display: none; opacity: 0; transform: translateX(20px); transition: all 0.4s ease-out; }
        .step-container.active { display: block; opacity: 1; transform: translateX(0); }

        .question-title { @apply text-2xl font-black text-slate-800 mb-6 leading-tight; }
        .input-label { @apply block text-sm font-bold text-slate-500 mb-2 uppercase tracking-wider; }
        .select-ui { @apply w-full bg-slate-50 border-2 border-slate-100 text-slate-900 text-base rounded-2xl focus:ring-0 focus:border-blue-600 block p-4 font-semibold shadow-sm transition-all; }
        
        /* 隐藏滚动条但允许滚动 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col no-scrollbar">

    <header class="fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-md z-50 px-6 py-4 border-b border-slate-50">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-2">
                <span id="step-name" class="text-xs font-black text-slate-400 uppercase tracking-widest">基础信息</span>
                <span id="step-counter" class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md">1</span>
            </div>
            <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-500 ease-out" style="width: 10%;"></div>
            </div>
        </div>
    </header>

    <main class="flex-grow pt-28 pb-32 px-6 max-w-md mx-auto w-full">
        
        <div id="step-1" class="step-container active" data-name="申请状态">
            <h2 class="question-title">首先，您的申请状态是？</h2>
            <select id="marital" class="select-ui border-blue-200 bg-blue-50 text-blue-900">
                <option value="single">单身 / 离婚 / 配偶不随行</option>
                <option value="married">已婚 / 同居配偶随行</option>
            </select>
            <p class="text-xs text-slate-400 mt-4">⚠️ 魁省对单身和已婚申请人采用两套完全不同的打分权重。</p>
        </div>

        <div id="step-2" class="step-container" data-name="主申条件">
            <h2 class="question-title">提交申请时，您的年龄是？</h2>
            <select id="age" class="select-ui calc-item">
                <option value="120,100">20 - 30 岁 (满分黄金期)</option>
                <option value="110,90">18 - 19 岁</option>
                <option value="110,95">31 岁</option>
                <option value="100,90">32 岁</option>
                <option value="90,81">33 岁</option>
                <option value="80,72">34 岁</option>
                <option value="75,68">35 岁</option>
                <option value="70,63">36 岁</option>
                <option value="65,59">37 岁</option>
                <option value="60,54">38 岁</option>
                <option value="55,50">39 岁</option>
                <option value="50,45">40 岁</option>
                <option value="40,36">41 岁</option>
                <option value="30,27">42 岁</option>
                <option value="0,0">45 岁及以上</option>
            </select>
        </div>

        <div id="step-3" class="step-container" data-name="主申条件">
            <h2 class="question-title">您的最高学历是？</h2>
            <select id="edu" class="select-ui calc-item">
                <option value="130,110">博士 (3e cycle) / 医学专科</option>
                <option value="117,99">硕士 2年以上 (2e cycle 2 ans+)</option>
                <option value="110,93">硕士 1年 (2e cycle 1 an)</option>
                <option value="104,88">大学本科 3-4年</option>
                <option value="91,77">大学本科 2年</option>
                <option value="78,66">大专技术类 3年 (Technique 3 ans)</option>
                <option value="52,44">大专技术类 1-2年</option>
                <option value="26,22">职业培训 DEP 900小时+</option>
                <option value="13,11">普通高中 (Secondaire général)</option>
            </select>
        </div>

        <div id="step-4" class="step-container" data-name="主申条件">
            <h2 class="question-title">过去 5 年内，您累积了多久的工作经验？</h2>
            <select id="exp" class="select-ui calc-item">
                <option value="70,50">48个月及以上 (满分)</option>
                <option value="50,35">36 - 47个月</option>
                <option value="40,30">24 - 35个月</option>
                <option value="20,15">12 - 23个月</option>
                <option value="0,0">少于 12个月</option>
            </select>
        </div>

        <div id="step-5" class="step-container" data-name="语言能力">
            <h2 class="question-title">您的法语听力和口语水平？</h2>
            <div class="space-y-4">
                <div>
                    <label
