<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 魁北克 PSTQ 打分器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); margin-bottom: 16px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-24">

    <div class="max-w-md mx-auto p-4">
        <!-- 头部 -->
        <header class="py-6 text-center">
            <h1 class="text-2xl font-bold text-blue-800">PSTQ 打分系统 (2026)</h1>
            <p class="text-gray-500 text-sm mt-2">基于 1400 分制最新选拔准则</p>
        </header>

        <!-- 1. 人力资本 -->
        <div class="card">
            <h2 class="font-bold text-gray-700 mb-4 border-b pb-2">1. 人力资本 (Max 520)</h2>
            
            <label class="block text-sm font-medium text-gray-600 mb-1">您的年龄</label>
            <select id="age" class="w-full border p-2 rounded mb-4 focus:ring-2 focus:ring-blue-500">
                <option value="120">18 - 35 岁 (120分)</option>
                <option value="110">36 岁 (110分)</option>
                <option value="100">37 岁 (100分)</option>
                <option value="0">45 岁以上 (0分)</option>
            </select>

            <label class="block text-sm font-medium text-gray-600 mb-1">法语口语等级 (听/说)</label>
            <select id="french" class="w-full border p-2 rounded mb-4">
                <option value="0">低于 7 级 (不符合多数门槛)</option>
                <option value="140">7 级 (140分)</option>
                <option value="170">8 级 (170分)</option>
                <option value="200">9 级及以上 (200分)</option>
            </select>
        </div>

        <!-- 2. 魁省劳动力需求 -->
        <div class="card">
            <h2 class="font-bold text-gray-700 mb-4 border-b pb-2">2. 魁省需求 (Max 700)</h2>
            
            <label class="block text-sm font-medium text-gray-600 mb-1">雇主 Offer (VJO) 所在地</label>
            <select id="vjo" class="w-full border p-2 rounded">
                <option value="0">无 VJO</option>
                <option value="30">大蒙特利尔地区 (30分)</option>
                <option value="390">大蒙特利尔以外偏远地区 (390分)</option>
            </select>
        </div>

        <!-- 底部实时总分 -->
        <div class="fixed bottom-0 left-0 right-0 bg-blue-900 text-white p-4 shadow-lg flex justify-between items-center">
            <div>
                <span class="text-sm opacity-80">预估总分</span>
                <div class="text-2xl font-bold"><span id="total-score">0</span> / 1400</div>
            </div>
            <button onclick="calculate()" class="bg-blue-500 hover:bg-blue-400 px-6 py-2 rounded-full font-bold">立即计算</button>
        </div>
    </div>

    <script>
        function calculate() {
            const ageScore = parseInt(document.getElementById('age').value);
            const frenchScore = parseInt(document.getElementById('french').value);
            const vjoScore = parseInt(document.getElementById('vjo').value);

            const total = ageScore + frenchScore + vjoScore;
            
            // 简单动画显示分数
            document.getElementById('total-score').innerText = total;

            if (frenchScore === 0) {
                alert("提醒：2026年新政要求法语口语通常需达到 7 级或以上。");
            }
        }
    </script>
</body>
</html>
