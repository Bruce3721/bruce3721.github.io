<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 魁省 PSTQ 精准打分系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { @apply bg-white rounded-2xl p-5 shadow-sm border border-slate-200 mb-4 transition-all; }
        .input-label { @apply block text-sm font-bold text-slate-700 mb-2; }
        .select-ui { @apply w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-blue-600 focus:border-blue-600 block p-3 appearance-none font-medium; }
        .section-title { @apply flex items-center mb-4 font-black text-slate-800 uppercase tracking-wider text-sm border-b pb-2; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-32">

    <div class="max-w-md mx-auto px-4">
        <header class="py-6 text-center">
            <span class="inline-block px-3 py-1 bg-blue-600 text-white rounded-full text-xs font-bold mb-2 shadow-sm">PSTQ 2026 OFFICIAL</span>
            <h1 class="text-2xl font-black text-slate-900 tracking-tight">魁北克技术移民评估</h1>
            <p class="text-slate-500 text-xs mt-2 font-medium">根据 2026 年 4 月 MIFI 最新法案实时计算</p>
        </header>

        <div class="card bg-blue-50 border-blue-100">
            <label class="input-label text-blue-800">婚姻及随行状态</label>
            <select id="marital" class="select-ui border-blue-200 bg-white" onchange="toggleSpouse(); calculate()">
                <option value="single">单身 / 配偶不随行</option>
                <option value="married">已婚 / 同居配偶随行 (启用双轨计分)</option>
            </select>
        </div>

        <div class="card">
            <h2 class="section-title text-blue-600">1. 主申核心条件</h2>
            
            <div class="mb-4">
                <label class="input-label">年龄 (提交申请时)</label>
                <select id="age" class="select-ui calc-item">
                    <option value="120,100">20 - 30 岁 (单身120分 / 已婚100分)</option>
                    <option value="110,90">18 - 19 岁</option>
                    <option value="110,95">31 岁</option>
                    <option value="100,90">32 岁</option>
                    <option value="90,81">33 岁</option>
                    <option value="75,68">35 岁</option>
                    <option value="50,45">40 岁</option>
                    <option value="0,0">45 岁以上 (0分)</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="input-label">最高学历</label>
                <select id="edu" class="select-ui calc-item">
                    <option value="104,88">大学本科 3-4年 (单身104 / 已婚88)</option>
                    <option value="110,93">硕士研究生 (单身110 / 已婚93)</option>
                    <option value="130,110">博士或医学专科 (满分)</option>
                    <option value="52,44">大专/技术专科 1-2年</option>
                    <option value="26,22">职业培训 DEP 900小时+</option>
                    <option value="13,11">高中</option>
                </select>
            </div>

            <div class="mb-2">
                <label class="input-label">全球工作经验 (过去5年内)</label>
                <select id="exp" class="select-ui calc-item">
                    <option value="70,50">48个月以上 (满分)</option>
                    <option value="50,35">36 - 47个月</option>
                    <option value="40,30">24 - 35个月</option>
                    <option value="20,15">12 - 23个月</option>
                    <option value="0,0">少于12个月</option>
                </select>
            </div>
        </div>

        <div class="card">
            <h2 class="section-title text-purple-600">2. 法语能力 (Niveau)</h2>
            <p class="text-xs text-slate-500 mb-3 font
