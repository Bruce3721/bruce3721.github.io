<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PSTQ 2026 官方全指标评估</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; -webkit-tap-highlight-color: transparent; }
        .step-container { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease-out; }
        .step-container.active { display: block; opacity: 1; transform: translateY(0); }
        .question-title { @apply text-2xl font-black text-slate-800 mb-4 leading-tight; }
        .input-label { @apply block text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-widest; }
        .select-ui { @apply w-full bg-slate-50 border-2 border-slate-100 text-slate-900 text-sm rounded-2xl focus:ring-0 focus:border-blue-600 block p-4 font-bold shadow-sm transition-all; }
        .hint-card { @apply bg-blue-50 border border-blue-100 rounded-xl p-3 text-[11px] text-blue-600 font-medium mb-4; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header id="top-header" class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-md z-50 px-6 py-4 border-b border-slate-50 hidden">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <span id="step-name" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">加载中...</span>
                <div class="h-1 w-32 bg-slate-100 rounded-full mt-1 overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-500" style="width: 5%;"></div>
                </div>
            </div>
            <span id="step-counter" class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md">1</span>
        </div>
    </header>

    <main class="flex-grow pt-16 pb-24 px-6 max-w-md mx-auto w-full flex flex-col justify-center">
        
        <div id="step-0" class="step-container active" data-name="欢迎页">
            <div class="text-center">
                <div class="w-20 h-20 mx-auto bg-blue-50 rounded-3xl flex items-center justify-center mb-6 shadow-inner"><span class="text-4xl">🍁</span></div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight mb-4">PSTQ 2026<br>全指标精算系统</h1>
                <p class="text-slate-500 text-sm mb-8 leading-relaxed font-medium">100% 还原 2026.04.15 官方评分手册<br>包含主申/配偶全部 23 项指标与地域加分</p>
                <button onclick="nextStep()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all text-lg tracking-widest">进入深度测评</button>
            </div>
        </div>

        <div id="step-1" class="step-container" data-name="基本信息">
            <h2 class="question-title">您的申请状态？</h2>
            <select id="marital" class="select-ui" onchange="updateUI()">
                <option value="single">单身 / 配偶不随行</option>
                <option value="married">已婚 / 同居配偶随行</option>
            </select>
        </div>

        <div id="step-2" class="step-container" data-name="语言能力">
            <h2 class="question-title">主申法语等级？</h2>
            <div class="hint-card">依据 Échelle québécoise 标准，N9+ 为单项满分。</div>
            <div class="space-y-3">
                <select id="fr_co" class="select-ui calc-item"><option value="50,40">听力 Niveau 9-12 (50/40)</option><option value="44,35" selected>听力 Niveau 7-8 (44/35)</option><option value="38,30">听力 Niveau 5-6 (38/30)</option><option value="0,0">听力 Niveau 1-4</option></select>
                <select id="fr_po" class="select-ui calc-item"><option value="50,40">口语 Niveau 9-12 (50/40)</option><option value="44,35" selected>口语 Niveau 7-8 (44/35)</option><option value="38,30">口语 Niveau 5-6 (38/30)</option><option value="0,0">口语 Niveau 1-4</option></select>
                <select id="fr_ce" class="select-ui calc-item"><option value="50,40">阅读 Niveau 9-12 (50/40)</option><option value="44,35">阅读 Niveau 7-8 (44/35)</option><option value="0,0">阅读 Niveau 1-4</option></select>
                <select id="fr_pe" class="select-ui calc-item"><option value="50,40">写作 Niveau 9-12 (50/40)</option><option value="44,35">写作 Niveau 7-8 (44/35)</option><option value="0,0">写作 Niveau 1-4</option></select>
            </div>
        </div>

        <div id="step-3" class="step-container" data-name="人力资本">
            <h2 class="question-title">主申基本情况？</h2>
            <div class="space-y-3">
                <label class="input-label">主申年龄 (精准档位)</label>
                <select id="age" class="select-ui calc-item"><option value="120,100">20-30岁 (120/100)</option><option value="100,90">32岁 (100/90)</option><option value="75,68">35岁 (75/68)</option><option value="50,45">40岁 (50/45)</option><option value="0,0">45岁+</option></select>
                <label class="input-label">最高学历对标</label>
                <select id="edu" class="select-ui calc-item"><option value="130,110">博士/医专 (130/110)</option><option value="117,99">硕士 2年+ (117/99)</option><option value="104,88">本科 3-4年 (104/88)</option><option value="78,66">大专技术 3年 (78/66)</option><option value="26,22">DEP 900h+ (26/22)</option></select>
                <label class="input-label">全球经验 (近5年)</label>
                <select id="exp" class="select-ui calc-item"><option value="70,50">48个月+ (70/50)</option><option value="40,30">24-35个月 (40/30)</option><option value="0,0">无</option></select>
            </div>
        </div>

        <div id="step-4" class="step-container" data-name="魁省需求">
            <h2 class="question-title">魁省本地加分？</h2>
            <div class="space-y-3">
                <select id="diag" class="select-ui calc-single"><option value="120">极度紧缺 (Déficit) + 48m+</option><option value="100">极度紧缺 + 12-23m / 轻度紧缺 + 48m+</option><option value="25">供需平衡 + 48m+</option><option value="0">无对应经验</option></select>
                <select id="qc_edu" class="select-ui calc-single"><option value="200">魁省博士/硕士 (200)</option><option value="160">魁省本科 (160)</option><option value="80">魁省大专技术 (80)</option><option value="0">无本地学历</option></select>
                <select id="qc_exp" class="select-ui calc-single"><option value="160">魁省工作 48个月+ (160)</option><option value="80">魁省工作 24-35个月 (80)</option><option value="0">无本地工作</option></select>
            </div>
        </div>

        <div id="step-5" class="step-container" data-name="地域加分">
            <h2 class="question-title">CMM 以外停留？</h2>
            <div class="hint-card">指居住、工作或学习在大蒙特利尔大区以外。</div>
            <div class="space-y-3">
                <select id="stay_res" class="select-ui calc-single"><option value="40">居住 48个月+ (40分)</option><option value="16">居住 12-23个月 (16分)</option><option value="0">无</option></select>
                <select id="stay_work" class="select-ui calc-single"><option value="60">工作 48个月+ (60分)</option><option value="24">工作 12-23个月 (24分)</option><option value="0">无</option></select>
                <select id="stay_study" class="select-ui calc-single"><option value="20">学习 48个月+ (20分)</option><option value="8">学习 12-23个月 (8分)</option><option value="0">无</option></select>
            </div>
        </div>

        <div id="step-6" class="step-container" data-name="适应能力">
            <h2 class="question-title">适应能力加分？</h2>
            <div class="space-y-4">
                <div><label class="input-label">魁省无文凭学习 (已完成/在读)</label>
                <select id="study_no_dip" class="select-ui calc-single"><option value="30">正在进行：48个月+ (30分)</option><option value="10">已完成：48个月+ (10分)</option><option value="0">无</option></select></div>
                <div><label class="input-label">受监管职业认证 / VJO</label>
                <div class="grid grid-cols-2 gap-2">
                    <select id="reg_auth" class="select-ui calc-single"><option value="50">执照认证 (50)</option><option value="0">无</option></select>
                    <select id="vjo" class="select-ui calc-single"><option value="50">VJO 偏远 (50)</option><option value="30">VJO 蒙城 (30)</option></select>
                </div></div>
            </div>
        </div>

        <div id="step-7" class="step-container sp-step" data-name="配偶加分">
            <h2 class="question-title text-pink-600">配偶综合评估？</h2>
            <div class="space-y-3">
                <label class="input-label">配偶法语 (听/说/读/写 单项加分)</label>
                <div class="grid grid-cols-2 gap-2">
                    <select id="sp_f1" class="select-ui sp-calc-single border-pink-100"><option value="10">听力 N9+ (10)</option><option value="8">听力 N7-8 (8)</option><option value="0">无</option></select>
                    <select id="sp_f2" class="select-ui sp-calc-single border-pink-100"><option value="10">口语 N9+ (10)</option><option value="8">口语 N7-8 (8)</option><option value="0">无</option></select>
                    <select id="sp_f3" class="select-ui sp-calc-single border-pink-100"><option value="10">阅读 N9+ (10)</option><option value="8">阅读 N7-8 (8)</option><option value="0">无</option></select>
                    <select id="sp_f4" class="select-ui sp-calc-single border-pink-100"><option value="10">写作 N9+ (10)</option><option value="8">写作 N7-8 (8)</option><option value="0">无</option></select>
                </div>
                <label class="input-label">配偶人力贡献</label>
                <select id="sp_age" class="select-ui sp-calc-single border-pink-100"><option value="20">年龄 20-30岁 (20)</option><option value="14">年龄 35岁 (14)</option><option value="0">45岁+</option></select>
                <select id="sp_edu" class="select-ui sp-calc-single border-pink-100"><option value="20">学历 硕士/博士 (20)</option><option value="16">学历 本科 (16)</option><option value="4">学历 DEP 900h+ (4)</option></select>
                <select id="sp_qc_edu" class="select-ui sp-calc-single border-pink-100"><option value="30">配偶魁省学历 (最高30)</option><option value="18">配偶技术大专 (18)</option><option value="0">无</option></select>
            </div>
        </div>

        <div id="step-8" class="step-container text-center pt-2">
            <div class="text-7xl font-black text-blue-700 mb-2 tracking-tighter" id="final-score">0</div>
            <div class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-10">Total Score / 1400</div>
            <div class="text-left bg-slate-50 p-6 rounded-2xl border border-slate-100 text-[11px] text-slate-500 italic">
                依据 2026.04.15 官方精算。包含配偶双轨制、本地化溢价、及 CMM 均衡加分。
            </div>
            <button onclick="location.reload()" class="mt-8 w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">重新开始</button>
        </div>
    </main>

    <footer id="nav-footer" class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-100 p-6 pb-10 z-50 hidden">
        <div class="max-w-md mx-auto flex gap-4">
            <button id="btn-prev" onclick="prevStep()" class="w-1/3 py-4 font-bold text-slate-400">返回</button>
            <button id="btn-next" onclick="nextStep()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg">下一步</button>
        </div>
    </footer>

    <script>
        const singlePath = [0, 1, 2, 3, 4, 5, 6, 8];
        const marriedPath = [0, 1, 2, 3, 4, 5, 6, 7, 8];
        let pathIdx = 0; let path = singlePath;

        function updateUI() {
            const isM = document.getElementById('marital').value === 'married';
            path = isM ? marriedPath : singlePath;
            const activeId = path[pathIdx];
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            document.getElementById(`step-${activeId}`).classList.add('active');

            const h = document.getElementById('top-header'); const f = document.getElementById('nav-footer');
            if (pathIdx === 0 || pathIdx === path.length - 1) { h.classList.add('hidden'); f.classList.add('hidden'); }
            else { 
                h.classList.remove('hidden'); f.classList.remove('hidden'); 
                document.getElementById('step-counter').innerText = `${pathIdx} / ${path.length - 2}`;
                document.getElementById('progress-bar').style.width = `${(pathIdx / (path.length - 2)) * 100}%`;
                document.getElementById('step-name').innerText = document.getElementById(`step-${activeId}`).getAttribute('data-name');
            }
            document.getElementById('btn-prev').style.visibility = pathIdx <= 1 ? 'hidden' : 'visible';
        }

        function nextStep() { pathIdx++; window.scrollTo(0,0); updateUI(); if(pathIdx === path.length-1) calc(); }
        function prevStep() { if(pathIdx > 0) { pathIdx--; window.scrollTo(0,0); updateUI(); } }

        function calc() {
            const isM = document.getElementById('marital').value === 'married';
            const vIdx = isM ? 1 : 0; let total = 0;
            document.querySelectorAll('.calc-item').forEach(el => { total += parseInt(el.value.split(',')[vIdx]) || 0; });
            document.querySelectorAll('.calc-single').forEach(el => { total += parseInt(el.value) || 0; });
            if (isM) document.querySelectorAll('.sp-calc-single').forEach(el => { total += parseInt(el.value) || 0; });
            
            let cur = 0; const t = setInterval(() => {
                cur += Math.ceil((total - cur) / 10) || 1;
                if (cur >= total) { cur = total; clearInterval(t); }
                document.getElementById('final-score').innerText = cur;
            }, 30);
        }
        updateUI();
    </script>
</body>
</html>
